            - generic [ref=e81]:
              - paragraph [ref=e82]: "To fix a hydraulic leak, you should follow these steps based on the available information: - Locate the source of the leak. - Check the integrity of hydraulic hoses for cracks, tears, or damage. - Replace worn seals and gaskets. - Inspect and tighten any loose connections. - Check the system pressure and adjust if necessary. - Monitor and maintain proper fluid level, using the correct type of fluid. These steps are derived from the context describing an observed hydraulic oil leak (source: [machine_issue:f139ee9d-f90c-4353-9b70-77b2e7f86a94]) and from guidance on gradual pressure loss due to component degradation (source: [machine_issue:0554e389-4cca-4500-97c2-03603cd532be])."
