version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: giba_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-giba_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your-db-password}
      POSTGRES_DB: ${POSTGRES_DB:-giba_hr}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - giba_network

  redis:
    image: redis:7-alpine
    container_name: giba_redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - giba_network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: giba_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-giba_user}:${POSTGRES_PASSWORD:-your-db-password}@postgres:5432/${POSTGRES_DB:-giba_hr}
      - REDIS_URL=redis://redis:6379/0
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - chroma_data:/app/data/chroma
    networks:
      - giba_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: giba_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - giba_network

volumes:
  postgres_data:
  chroma_data:

networks:
  giba_network:
    driver: bridge
