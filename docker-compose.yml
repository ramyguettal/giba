version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: giba_backend
    restart: always
    # Dev override: the image's default CMD is production (migrations + no
    # reload); locally we mount the source and hot-reload instead.
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    environment:
      # Supabase-hosted Postgres (relational tables + pgvector live in the same DB)
      - DATABASE_URL=${DATABASE_URL:?Set DATABASE_URL in .env (Supabase Postgres connection string)}
      - DATABASE_SSLMODE=${DATABASE_SSLMODE:-require}
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    networks:
      - giba_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: giba_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - giba_network

networks:
  giba_network:
    driver: bridge
