version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: giba_redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - giba_network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: giba_backend
    restart: always
    environment:
      # Supabase-hosted Postgres (relational tables + pgvector live in the same DB)
      - DATABASE_URL=${DATABASE_URL:?Set DATABASE_URL in .env (Supabase Postgres connection string)}
      - DATABASE_SSLMODE=${DATABASE_SSLMODE:-require}
      - REDIS_URL=redis://redis:6379/0
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    networks:
      - giba_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: giba_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - giba_network

volumes:
  # No database volume here: Postgres is hosted in Supabase.

networks:
  giba_network:
    driver: bridge
